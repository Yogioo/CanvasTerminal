[package]
name = "egui_node_graph_mvp"
version = "0.1.0"
edition = "2021"
default-run = "egui_node_graph_mvp"

[dependencies]
eframe = "0.31"
egui = "0.31"
egui_term = "0.1.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
ureq = { version = "2", features = ["json"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp", "bmp"] }
arboard = "3"

[patch.crates-io]
egui_term = { path = "vendor/egui_term" }
